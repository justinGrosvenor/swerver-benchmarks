services:
  swerver:
    build:
      context: ../../servers/swerver
      args:
        SWERVER_LOCAL_PATH: "true"
    command: ["swerver", "--config", "/app/config.json"]
    volumes:
      - ./swerver-config.json:/app/config.json:ro
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512m
    healthcheck:
      test: ["CMD", "curl", "-sSf", "http://localhost:8080/health"]
      interval: 2s
      timeout: 5s
      retries: 10
    depends_on:
      users-service:
        condition: service_healthy
      products-service:
        condition: service_healthy

  users-service:
    build: ./backends/users-service
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  products-service:
    build: ./backends/products-service
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 2s
      timeout: 5s
      retries: 10

services:
  swerver:
    build:
      context: ../../servers/swerver
      args:
        SWERVER_LOCAL_PATH: "true"
    command: ["swerver", "--config", "/app/config.json"]
    volumes:
      - ./swerver-config.json:/app/config.json:ro
      - ./static:/app/static:ro
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512m
    healthcheck:
      test: ["CMD", "curl", "-sSf", "http://localhost:8080/health"]
      interval: 2s
      timeout: 5s
      retries: 10
    depends_on:
      api-service:
        condition: service_healthy

  api-service:
    build: ./backends/api
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 2s
      timeout: 5s
      retries: 10

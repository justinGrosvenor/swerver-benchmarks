deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml

apisix:
  node_listen: 9080
  enable_admin: false
  enable_ipv6: false
  enable_http2: true
  ssl:
    enable: true
    listen:
      - port: 9443

nginx_config:
  worker_processes: auto
  error_log_level: warn
  http:
    access_log: /dev/null
    keepalive_timeout: 75s

x-server-defaults: &server-defaults
  deploy:
    resources:
      limits:
        cpus: "${BENCHMARK_CPUS:-2}"
        memory: "${BENCHMARK_MEMORY:-512m}"
  cpus: "${BENCHMARK_CPUS:-2}"
  mem_limit: "${BENCHMARK_MEMORY:-512m}"
  networks:
    - benchmark
  restart: "no"

services:
  # ============================================================
  # Servers Under Test
  # ============================================================

  swerver:
    <<: *server-defaults
    build:
      context: ./servers/swerver
      args:
        SWERVER_REF: "${SWERVER_REF:-main}"
        SWERVER_REPO: "${SWERVER_REPO:-https://github.com/justinGrosvenor/swerver.git}"
        SWERVER_LOCAL_PATH: "1"
    # Docker's default seccomp profile filters the io_uring_setup /
    # io_uring_enter / io_uring_register syscalls, which forces swerver's
    # backend picker to fall through to epoll. That defeats the whole
    # point of the benchmark — we want to measure the native io_uring
    # backend that will run in production. Unconfined seccomp here means
    # no syscall filter, so io_uring_* can land.
    security_opt:
      - seccomp:unconfined
    # Allow forcing a specific backend for A/B comparison. When unset,
    # swerver's picker auto-selects the best available (native > poll > epoll).
    # Accepts: native, poll, epoll
    environment:
      - SWERVER_BACKEND=${SWERVER_BACKEND:-}
      - SWERVER_INLINE_ACCEPT=${SWERVER_INLINE_ACCEPT:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sSf", "http://localhost:8080/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  nginx:
    <<: *server-defaults
    build:
      context: ./servers/nginx
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-sSf", "http://localhost:8080/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  httpzig:
    <<: *server-defaults
    build:
      context: ./servers/http-zig
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "-sSf", "http://localhost:8080/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  actix:
    <<: *server-defaults
    build:
      context: ./servers/actix
    ports:
      - "8083:8080"
    healthcheck:
      test: ["CMD", "curl", "-sSf", "http://localhost:8080/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  apisix:
    <<: *server-defaults
    build:
      context: ./servers/apisix
    ports:
      - "8084:8080"
    healthcheck:
      test: ["CMD", "curl", "-sSf", "http://localhost:8080/health"]
      interval: 2s
      timeout: 5s
      retries: 30

  # ============================================================
  # Load Generator
  # ============================================================

  k6:
    build:
      context: ./k6
    environment:
      - K6_VUS=${K6_VUS:-100}
      - K6_DURATION=${K6_DURATION:-30s}
      - TARGET_HOST=${TARGET_HOST:-swerver}
      - TARGET_PORT=${TARGET_PORT:-8080}
    volumes:
      - ./k6/scenarios:/scenarios:ro
      - ./results:/results
    networks:
      - benchmark
    depends_on:
      swerver:
        condition: service_healthy
      nginx:
        condition: service_healthy
      httpzig:
        condition: service_healthy
      actix:
        condition: service_healthy
      apisix:
        condition: service_healthy
    profiles:
      - benchmark

networks:
  benchmark:
    driver: bridge

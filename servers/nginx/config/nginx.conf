# Nginx benchmark configuration
# Tuned for fair comparison with other HTTP servers

worker_processes auto;
worker_rlimit_nofile 65535;

error_log /dev/null;
pid /tmp/nginx.pid;

events {
    worker_connections 10000;
    use epoll;
    multi_accept on;
}

http {
    # Disable access logging for benchmark
    access_log off;
    error_log /dev/null;

    # Sendfile and TCP optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Keep-alive settings (match swerver defaults)
    keepalive_timeout 75s;
    keepalive_requests 1000;

    # Buffer sizes
    client_body_buffer_size 16k;
    client_max_body_size 10m;

    # Disable server tokens
    server_tokens off;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 8080 reuseport;
        server_name _;

        # /health - empty 200 response
        location = /health {
            return 200;
        }

        # /echo GET - return JSON
        location = /echo {
            if ($request_method = GET) {
                add_header Content-Type application/json;
                return 200 '{"status":"ok"}';
            }

            # /echo POST - echo request body
            if ($request_method = POST) {
                add_header Content-Type application/json;
                # nginx can't easily echo body, use proxy_pass to itself or lua
                # For now, return the static response
                return 200 '{"status":"ok"}';
            }
        }

        # /blob - 1MB response
        location = /blob {
            alias /var/www/html/blob.bin;
            add_header Content-Type application/octet-stream;
        }

        # Catch-all
        location / {
            return 404;
        }
    }
}

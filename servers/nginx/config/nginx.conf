# Nginx benchmark configuration
# Tuned for fair comparison with other HTTP servers

worker_processes auto;
worker_rlimit_nofile 65535;

error_log /dev/null;
pid /tmp/nginx.pid;

events {
    worker_connections 10000;
    use epoll;
    multi_accept on;
}

http {
    # Disable access logging for benchmark
    access_log off;
    error_log /dev/null;

    # Sendfile and TCP optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Keep-alive settings (match swerver defaults)
    keepalive_timeout 75s;
    keepalive_requests 1000;

    # Buffer sizes
    client_body_buffer_size 16k;
    client_max_body_size 10m;

    # Disable server tokens
    server_tokens off;

    # MIME types
    include /usr/local/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;

    server {
        listen 8080 reuseport;
        server_name _;

        # /health - empty 200 response
        location = /health {
            return 200;
        }

        # /echo GET - return JSON
        # /echo POST - echo request body (requires OpenResty/lua)
        location = /echo {
            content_by_lua_block {
                if ngx.req.get_method() == "GET" then
                    ngx.header.content_type = "application/json"
                    ngx.print('{"status":"ok"}')
                elseif ngx.req.get_method() == "POST" then
                    ngx.req.read_body()
                    local body = ngx.req.get_body_data()
                    if body then
                        ngx.header.content_type = "application/json"
                        ngx.print(body)
                    else
                        ngx.header.content_type = "application/json"
                        ngx.print('{"status":"ok"}')
                    end
                else
                    ngx.status = 405
                    ngx.say("Method Not Allowed")
                end
            }
        }

        # /blob - 8KB response
        location = /blob {
            alias /var/www/html/blob.bin;
            add_header Content-Type application/octet-stream;
        }

        # Catch-all
        location / {
            return 404;
        }
    }
}
